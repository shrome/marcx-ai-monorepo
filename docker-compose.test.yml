version: "3.9"

services:
  postgres-test:
    image: postgres:16
    container_name: postgres-test
    environment:
      POSTGRES_DB: marcx_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "15433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d marcx_test"]
      interval: 5s
      timeout: 5s
      retries: 10
