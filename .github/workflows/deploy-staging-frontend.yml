name: 'Deploy Frontend (Staging)'

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - '.docker/**'
      - 'docker-compose*.yml'
      - 'Caddyfile'
      - 'scripts/**'
      - 'turbo.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - '.github/workflows/**'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_WEB: ${{ github.repository }}-web

jobs:
  build-and-deploy-web:
    runs-on: ubuntu-latest

    steps:
      # ───────────────────────────────
      # Checkout
      # ───────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ───────────────────────────────
      # Login to GHCR
      # ───────────────────────────────
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ───────────────────────────────
      # Build & Push Web
      # ───────────────────────────────
      - name: Build & Push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./.docker/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_WEB }}:latest
            ghcr.io/${{ env.IMAGE_WEB }}:${{ github.sha }}
          build-args: |
            API_URL=${{ vars.API_URL }}
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}

      # ───────────────────────────────
      # Deploy Frontend to EC2
      # ───────────────────────────────
      - name: Deploy Frontend to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_EC2_HOST }}
          username: ${{ secrets.STAGING_EC2_USER }}
          key: ${{ secrets.STAGING_EC2_SSH_KEY }}
          script: |
            set -e
            echo "Deploying frontend on EC2..."
            cd ~/marcx-ai
            test -f .env || (echo ".env missing" && exit 1)
            curl -fsSL \
              https://raw.githubusercontent.com/shrome/marcx-ai-monorepo/${{ github.sha }}/docker-compose.yml \
              -o docker-compose.yml
            echo "Fetched latest docker-compose.yml"
            curl -fsSL \
              https://raw.githubusercontent.com/shrome/marcx-ai-monorepo/${{ github.sha }}/Caddyfile \
              -o Caddyfile
            echo "Fetched latest Caddyfile"
            docker compose pull web
            echo "Restarting web container..."
            docker compose up -d --no-deps --force-recreate web
