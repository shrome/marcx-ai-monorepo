name: 'Deploy Backend (Staging)'

on:
  push:
    branches:
      - main
    paths:
      - 'apps/backend/**'
      - 'packages/drizzle/**'
      - '.docker/backend/Dockerfile'
      - 'docker-compose.yml'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository }}-backend

jobs:
  build-and-deploy-backend:
    runs-on: ubuntu-latest

    steps:
      # ───────────────────────────────
      # Checkout
      # ───────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ───────────────────────────────
      # Login to GHCR
      # ───────────────────────────────
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ───────────────────────────────
      # Build & Push Backend
      # ───────────────────────────────
      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./.docker/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_BACKEND }}:latest
            ghcr.io/${{ env.IMAGE_BACKEND }}:${{ github.sha }}

      # ───────────────────────────────
      # Deploy Backend to EC2
      # ───────────────────────────────
      - name: Deploy Backend to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_EC2_HOST }}
          username: ${{ secrets.STAGING_EC2_USER }}
          key: ${{ secrets.STAGING_EC2_SSH_KEY }}
          script: |
            set -e
            echo "Deploying backend on EC2..."
            cd ~/marcx-ai
            test -f .env || (echo ".env missing" && exit 1)
            curl -fsSL \
              https://raw.githubusercontent.com/shrome/marcx-ai-monorepo/${{ github.sha }}/docker-compose.yml \
              -o docker-compose.yml
            echo "Fetched latest docker-compose.yml"
            docker compose pull backend
            echo "Restarting backend container..."
            docker compose up -d --no-deps --force-recreate backend
